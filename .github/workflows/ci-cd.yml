name: CI/CD - SpringBoot Angular MySQL
on:
  push:
    branches:
      - main

jobs:
  build-deploy :
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: setup jdk-11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
      - name: build spring app
        working-directory: ./springboot/app/
        run : mvn clean package
      - name: setup node for angular
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: npm install
        working-directory: ./angular-app
        run: npm install --force
      - name: build angular
        working-directory: ./angular-app
        run: npm run build --force

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name : backend image build
        working-directory: ./springboot/app
        run : docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/springapp:latest .
      - name : frontend image build  	
        working-directory: ./angular-app
        run : docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/angularapp:latest .
      - name : back end image push
        run : docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/springapp:latest
      - name : front end image push
        run : docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/angularapp:latest	
      - name : docker compose launching
        working-directory: ./
        run: | 
          docker compose down
          docker compose up -d  
